{% extends "base.html" %}
{% block title %}Add SKU Mapping - Culture Circle{% endblock %}
{% block page_title %}Map SKU to Blank{% endblock %}

{% block topbar_actions %}
<a href="/blanks/mappings" class="btn-ghost"><i class="bi bi-arrow-left me-1"></i> Back to Mappings</a>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="cc-card">
            <div class="cc-card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label" style="font-size:13px; font-weight:600;">Product Name (from CSV) *</label>
                        <input type="text" name="product" class="form-control" style="border-radius:8px;" value="{{ product }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" style="font-size:13px; font-weight:600;">Brand</label>
                            <input type="text" name="brand" class="form-control" style="border-radius:8px;" value="{{ brand }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" style="font-size:13px; font-weight:600;">Size *</label>
                            <input type="text" name="size" class="form-control" style="border-radius:8px;" value="{{ size }}" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" style="font-size:13px; font-weight:600;">Maps to Blank *</label>
                        <select name="blank_id" class="form-select" style="border-radius:8px;" required>
                            <option value="">-- Select Blank --</option>
                            {% for b in blanks %}
                            <option value="{{ b.blank_id }}">{{ b.blank_name }} ({{ b.size }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn-cc">Create Mapping</button>
                        <a href="/blanks/mappings" class="btn-ghost">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
